global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "dns_exporter"
    static_configs:
      - targets: ["dns-exporter:9253"]
    scrape_interval: 30s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
