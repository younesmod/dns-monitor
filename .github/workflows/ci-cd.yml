name: DNS Monitor CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1: Lint & Validation
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install linting tools
        run: |
          pip install --upgrade pip
          pip install flake8 pylint black yamllint

      - name: 🎨 Check Python code formatting
        run: |
          black --check exporter/dns_exporter.py || echo "::warning::Code formatting issues found"

      - name: 🔍 Lint Python code
        run: |
          flake8 exporter/dns_exporter.py --max-line-length=100 --ignore=E501,W503
          
      - name: 📋 Lint YAML files
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 120}}}" \
            docker-compose.yml \
            prometheus/*.yml \
            grafana/provisioning/**/*.yml || true

      - name: 🐳 Validate docker-compose
        run: |
          docker-compose config > /dev/null

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2: Security Scan
  # ═══════════════════════════════════════════════════════════════════════════
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📊 Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: 🐍 Security check Python dependencies
        run: |
          pip install safety
          safety check -r exporter/requirements.txt --json || true

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3: Build & Test
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    needs: [lint, security]
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build DNS Exporter image
        uses: docker/build-push-action@v5
        with:
          context: ./exporter
          push: false
          tags: dns-exporter:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🧪 Test docker-compose up
        run: |
          docker-compose up -d
          sleep 30
          
      - name: ✅ Health checks
        run: |
          echo "Checking DNS Exporter..."
          curl -f http://localhost:9253/metrics || exit 1
          
          echo "Checking Prometheus..."
          curl -f http://localhost:9090/-/healthy || exit 1
          
          echo "Checking Grafana..."
          curl -f http://localhost:3000/api/health || exit 1

      - name: 📋 Show logs on failure
        if: failure()
        run: |
          docker-compose logs

      - name: 🛑 Cleanup
        if: always()
        run: |
          docker-compose down -v

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 4: Build & Push Images (only on main branch)
  # ═══════════════════════════════════════════════════════════════════════════
  push:
    name: 📦 Build & Push Images
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-exporter
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🏗️ Build and push DNS Exporter
        uses: docker/build-push-action@v5
        with:
          context: ./exporter
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 5: Deploy to Production
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: http://your-server-ip:3000
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📦 Copy files to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "\
            mkdir -p /srv/dns-monitor && \
            cd /srv/dns-monitor"
          
          scp -o StrictHostKeyChecking=no -r \
            docker-compose.yml \
            prometheus \
            grafana \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/srv/dns-monitor/

      - name: 🚀 Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "\
            cd /srv/dns-monitor && \
            export GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_USERNAME }} && \
            export GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_PASSWORD }} && \
            docker-compose pull && \
            docker-compose up -d --force-recreate"

      - name: ✅ Verify deployment
        run: |
          sleep 30
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "\
            curl -f http://localhost:9253/metrics && \
            curl -f http://localhost:9090/-/healthy && \
            curl -f http://localhost:3000/api/health"

      - name: 📊 Deployment summary
        run: |
          echo "### 🎉 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Grafana**: http://${{ secrets.SSH_HOST }}:3000" >> $GITHUB_STEP_SUMMARY
          echo "- **Prometheus**: http://${{ secrets.SSH_HOST }}:9090" >> $GITHUB_STEP_SUMMARY
          echo "- **DNS Exporter**: http://${{ secrets.SSH_HOST }}:9253" >> $GITHUB_STEP_SUMMARY
